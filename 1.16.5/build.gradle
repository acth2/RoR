buildscript {
    repositories {
        maven { url = 'https://maven.minecraftforge.net' }
        gradlePluginPortal()
    }
    dependencies {
        classpath 'net.minecraftforge.gradle:ForgeGradle:5.1.+', { changing = true }
    }
}

apply plugin: 'net.minecraftforge.gradle'
apply plugin: 'java'
apply plugin: 'eclipse'

version = "1.0.0-1.16.5"
archivesBaseName = 'ror-1.16.5'

java {
    toolchain.languageVersion = JavaLanguageVersion.of(8)
}

minecraft {
    mappings channel: 'official', version: '1.16.5'

    runs {
        client {
            workingDirectory project.file('run')
            property 'forge.logging.markers', 'REGISTRIES'
            property 'forge.logging.console.level', 'debug'
            mods {
                ror {
                    source sourceSets.main
                }
            }
        }
        server {
            workingDirectory project.file('run')
            property 'forge.logging.markers', 'REGISTRIES'
            property 'forge.logging.console.level', 'debug'
            mods {
                ror {
                    source sourceSets.main
                }
            }
        }
        data {
            workingDirectory project.file('run')
            property 'forge.logging.markers', 'REGISTRIES'
            property 'forge.logging.console.level', 'debug'
            args '--mod', 'ror', '--all',
                 '--output', file('src/generated/resources/'),
                 '--existing', file('src/main/resources/')
            mods {
                ror {
                    source sourceSets.main
                }
            }
        }
    }
}

sourceSets {
    main {
        java {
            srcDirs += project(':common').sourceSets.main.java.srcDirs
        }
        resources {
            srcDirs += project(':common').sourceSets.main.resources.srcDirs
            srcDir 'src/generated/resources'   // datagen output
        }
    }
}

dependencies {
    minecraft "net.minecraftforge:forge:1.16.5-${forge_1_16_5}"

    implementation fg.deobf('software.bernie.geckolib:geckolib-forge-1.16.5:3.0.106')
}

jar.finalizedBy('reobfJar')